<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        .calculator {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .display {
    width: 100%;
    height: 50px;
    margin-bottom: 10px;
    font-size: 20px;
    padding: 10px;
    text-align: right;
    border: none;
    border-radius: 5px;
    color: white;
    background: #000; /* optional: makes white text visible */
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-number {
            background: #eee;
        }

        .btn-operator {
            background: orange;
            color: white;
        }

        .btn-clear {
            background: red;
            color: white;
        }

        .btn-equal {
            background: green;
            color: white;
            grid-column: span 2;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>Calculator</h1>

    <div class="calculator">
        <input type="text" id="display" class="display" disabled>

        <div class="buttons">
            <button class="btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn-operator" onclick="append('/')">/</button>
            <button class="btn-operator" onclick="append('*')">*</button>
            <button class="btn-operator" onclick="append('-')">-</button>

            <button class="btn-number" onclick="append('7')">7</button>
            <button class="btn-number" onclick="append('8')">8</button>
            <button class="btn-number" onclick="append('9')">9</button>
            <button class="btn-operator" onclick="append('+')">+</button>

            <button class="btn-number" onclick="append('4')">4</button>
            <button class="btn-number" onclick="append('5')">5</button>
            <button class="btn-number" onclick="append('6')">6</button>
            <button class="btn-equal" onclick="calculate()">=</button>

            <button class="btn-number" onclick="append('1')">1</button>
            <button class="btn-number" onclick="append('2')">2</button>
            <button class="btn-number" onclick="append('3')">3</button>

            <button class="btn-number" onclick="append('0')">0</button>
            <button class="btn-number" onclick="append('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById("display");

        function append(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
            }
        }
    </script>

</body>
</html>
