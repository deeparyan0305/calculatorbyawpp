<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #121212);
}

.container {
    text-align: center;
}

h1 {
    color: white;
    margin-bottom: 20px;
}

.calculator {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.display {
    width: 100%;
    height: 70px;
    background: #000;
    color: #fff;
    font-size: 28px;
    text-align: right;
    padding: 15px;
    border: none;
    border-radius: 10px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 70px);
    gap: 12px;
}

button {
    height: 60px;
    border: none;
    border-radius: 15px;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

/* Button Styles */
.num {
    background: #2e2e2e;
    color: white;
}

.op {
    background: #ff9500;
    color: white;
}

.clear {
    background: #ff3b30;
    color: white;
}

.equal {
    background: #34c759;
    color: white;
    grid-column: span 2;
}

button:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">
    <h1>Calculator</h1>

    <div class="calculator">
        <input type="text" id="display" class="display" disabled>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="op" onclick="append('/')">÷</button>
            <button class="op" onclick="append('*')">×</button>
            <button class="op" onclick="append('-')">−</button>

            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('+')">+</button>

            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>

            <button class="num" onclick="append('0')">0</button>
            <button class="num" onclick="append('.')">.</button>
        </div>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}
</script>

</body>
</html>
